name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest  # Added space after colon

    steps:
      - name: Checkout code  # Added space after hyphen and colon
        uses: actions/checkout@v4

      - name: Set up Python  # Added space after hyphen and colon
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Quoted version is safer
      
      - name: Install dependencies 
        run: |
          python -m pip install --upgrade pip
          pip install pytest streamlit
      
      - name: Run tests
        run: |
          pytest _test.py